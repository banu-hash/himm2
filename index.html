<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my love  For You baby 🌸💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(-45deg, #ffd1dc, #ffecd2, #ffe6f0, #f8d7da);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .petal {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 10;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 20;
            animation: fadeInUp 1.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            font-weight: 700;
            color: #ff4d6d;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .message {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        #flower {
            font-size: 120px;
            margin: 40px 0;
            display: inline-block;
            animation: float 3s ease-in-out infinite, spin 20s linear infinite;
            filter: drop-shadow(0 10px 20px rgba(255, 77, 109, 0.4));
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        #flower:hover {
            transform: scale(1.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .give-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff6b9d);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
            transition: all 0.3s ease;
            margin: 20px;
            position: relative;
            overflow: hidden;
        }

        .give-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.6);
        }

        .give-btn:active {
            transform: translateY(-2px);
        }

        #message {
            font-size: 1.5rem;
            color: #ff4d6d;
            font-weight: 600;
            margin-top: 30px;
            min-height: 50px;
            opacity: 0;
            animation: messagePop 0.5s ease forwards;
        }

        @keyframes messagePop {
            0% { opacity: 0; transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .surprise-btn {
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            color: #333;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
        }

        .surprise-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.6);
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff4d6d;
            pointer-events: none;
            animation: heartFloat 2s ease-out forwards;
            z-index: 15;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(0) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .garden {
            display: none;
            margin-top: 50px;
        }

        .garden.active {
            display: block;
            animation: fadeInUp 1s ease;
        }

        .garden-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .garden-flower {
            font-size: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .garden-flower:hover {
            transform: scale(1.2) rotate(10deg);
            background: rgba(255, 255, 255, 1);
        }

        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            #flower { font-size: 90px; }
            .message { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
